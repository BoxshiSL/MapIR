name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system tk (for UI smoke test)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install MapIR (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Validate bundled examples
        run: |
          for f in examples/worlds/*.json examples/scenes/*.json; do
            python -m mapir.cli validate "$f"
          done
