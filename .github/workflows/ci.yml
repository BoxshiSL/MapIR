name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (windows-latest, py3.11)
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Preflight
        run: python -m mapir.cli preflight

      - name: Lint (ruff)
        run: ruff check mapir tests scripts

      - name: Lint (black --check)
        run: black --check mapir tests scripts

      - name: Pytest
        run: python -m pytest -q

      - name: Validate bundled examples
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path examples/worlds, examples/scenes -Filter *.json
          foreach ($f in $files) {
            python -m mapir.cli validate "$($f.FullName)"
            if ($LASTEXITCODE -ne 0) { throw "validate failed for $($f.FullName)" }
          }

      - name: Smoke render-svg
        run: python -m mapir.cli render-svg examples/scenes/scene_urban_alley.json --out output/svg/ci_scene_urban_alley.svg

      - name: Smoke export-obj
        run: python -m mapir.cli export-obj examples/scenes/scene_urban_alley.json --out output/obj/ci_scene_urban_alley.obj

      - name: Smoke export-blender
        run: python -m mapir.cli export-blender examples/scenes/scene_warehouse_interior.json --out output/blender/ci_scene_warehouse_interior.py
