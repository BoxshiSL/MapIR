<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120.00 90.00" width="600" height="450" preserveAspectRatio="xMidYMid meet"><style>.bg            { fill: #ffffff; stroke: #222; stroke-width: 0.3%; }
.world-bounds  { fill: #fafafa; stroke: #444; stroke-width: 0.25%; stroke-dasharray: 4 2; }
