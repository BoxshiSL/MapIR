<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70.00 50.00" width="600" height="429" preserveAspectRatio="xMidYMid meet"><style>.bg            { fill: #ffffff; stroke: #222; stroke-width: 0.3%; }
.world-bounds  { fill: #fafafa; stroke: #444; stroke-width: 0.25%; stroke-dasharray: 4 2; }
