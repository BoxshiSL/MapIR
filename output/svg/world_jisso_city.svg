<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4000.00 3000.00" width="1600" height="1200" preserveAspectRatio="xMidYMid meet"><style>.bg            { fill: #ffffff; stroke: #222; stroke-width: 0.3%; }
