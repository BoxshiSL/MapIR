<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000.00 2000.00" width="1600" height="1067" preserveAspectRatio="xMidYMid meet"><style>.bg            { fill: #ffffff; stroke: #222; stroke-width: 0.3%; }
.world-bounds  { fill: #fafafa; stroke: #444; stroke-width: 0.25%; stroke-dasharray: 4 2; }
