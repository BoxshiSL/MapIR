<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80.00 45.00" width="600" height="338" preserveAspectRatio="xMidYMid meet"><style>.bg            { fill: #ffffff; stroke: #222; stroke-width: 0.3%; }
